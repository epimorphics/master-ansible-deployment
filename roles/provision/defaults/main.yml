---
env: "infra"

az:
  - "{{ region }}a"
  - "{{ region }}b"
  - "{{ region }}c"


ec2_images:
  eu-west-1: ami-0428ac7f9776f14c3 # Almalinux 9.7 in eu-west-1
  eu-west-2: ami-0f32f991a40e3cbca # Almalinux 9.7 in eu-west-2

ec2_default_image: "{{ ec2_images[region] }}"

ec2_state: "running"
replace_instances: True

elastic_ip_groups: []
email: "{{ instance }}-ops-alerts@epimorphics.com" # Note {{ domain }} is .net

hostname_root: "{{ instance }}-{{ band | default(env) }}" # basis for the hostname
hostname_index: true                      # are hosts numbered (even if there is only 1)

ec2_role: "{{ instance }}-ec2"

iam_policies:
  - "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"
  - "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"

inline_policies:
  - { policy: "{{ instance }}-s3-readwrite", file: "iam/s3-readwrite.json.j2" }
  - { policy: "{{ instance }}-ec2-tag-access", file: "iam/ec2-tag-access.json" }
  - { policy: "{{ instance }}-elb-fullaccess", file: "iam/elb-fullaccess.json" }
  - { policy: "{{ instance }}-cloudwatch", file: "iam/cloudwatch.json" }

key:
  name: "{{ keyname | default(instance) }}"
  material: "{{ lookup('file', 'id_rsa.pub') }}"

security_group: "default"

s3_readwrite:
  - "{{ s3_bucket }}"
  - "{{ s3_logs }}"

# staff: "{{ vault_staff }}"

ssl_certificate_id: "arn:aws:acm:eu-west-1:{{ aws.account_id }}:certificate/aa40074e-6439-4158-b7c0-9fa8a5002718"

vpc:
  name: "{{ instance }}-vpc"
  cidr: "{{ internal_subnet }}"

elb:
  timeout:  120 # seconds
